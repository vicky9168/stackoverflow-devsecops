apiVersion: apps/v1
kind: Deployment
metadata:
  name: mern-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mern-app

  template:
    metadata:
      labels:
        app: mern-app
    spec:
      containers:
      - name: mern-app
        image: vickydockek11/stackflow:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: CONNECTION_URL
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: CONNECTION_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: JWT_SECRET
